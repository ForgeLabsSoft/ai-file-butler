name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release on tags

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish single-file, self-contained exe
        run: >
          dotnet publish AIFileButler.csproj -c Release -r win-x64
          -p:PublishSingleFile=true --self-contained true

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build the installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\AIFileButler.iss'

      - name: Compute SHA-256 checksums
        run: |
          $exe = "installer\Output\AIFileButler-Setup.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$hash  AIFileButler-Setup.exe" | Out-File installer\Output\SHA256SUMS.txt -Encoding ascii
          Write-Host "SHA-256: $hash"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIFileButler-Setup
          path: |
            installer/Output/AIFileButler-Setup.exe
            installer/Output/SHA256SUMS.txt

      - name: Publish GitHub Release (on v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/AIFileButler-Setup.exe
            installer/Output/SHA256SUMS.txt
          generate_release_notes: true
